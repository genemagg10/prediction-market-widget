name: PredictionMarketWidget
options:
  bundleIdPrefix: com.genemagg10
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  PredictionMarketWidget:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
      - path: Shared
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Prediction Markets
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.finance
        NSHumanReadableCopyright: "Copyright © 2026 genemagg10. All rights reserved."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genemagg10.PredictionMarketWidget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: App/PredictionMarketWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.genemagg10.PredictionMarketWidget
    dependencies:
      - target: PredictionMarketWidgetExtension
        embed: true

  PredictionMarketWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: WidgetExtension
      - path: Shared
    info:
      path: WidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: Prediction Market Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genemagg10.PredictionMarketWidget.WidgetExtension
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: WidgetExtension/PredictionMarketWidgetExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.genemagg10.PredictionMarketWidget
