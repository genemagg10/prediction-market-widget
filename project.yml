name: PredictionMarketWidget
options:
  bundleIdPrefix: com.genemagg10
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PredictionMarketWidget:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genemagg10.PredictionMarketWidget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Prediction Markets"
    entitlements:
      path: App/PredictionMarketWidget.entitlements
    dependencies:
      - target: PredictionMarketWidgetExtension
        embed: true

  PredictionMarketWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: WidgetExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genemagg10.PredictionMarketWidget.widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: WidgetExtension/Info.plist
    entitlements:
      path: WidgetExtension/PredictionMarketWidgetExtension.entitlements
